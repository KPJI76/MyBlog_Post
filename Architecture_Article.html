<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Five Architectural Domains AI Still Cannot Own</title>
<meta name="description" content="Technology accelerates the work. Accountability stays with humans. Five architectural domains where AI cannot hold the reins.">
<meta property="og:title" content="Five Architectural Domains AI Still Cannot Own">
<meta property="og:description" content="Technology accelerates the work. Accountability stays with humans.">
<meta property="og:type" content="article">
<meta name="twitter:card" content="summary_large_image">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulseGlow {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.7; }
  }
  ::selection { background: #00c8b450; color: #fff; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: #080d14; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const DOMAINS = [
  {
    num: "01",
    title: "Strategic Trade-off Decisions",
    body: "In SAP migrations, automation can analyse custom code and suggest remediation paths. But the architect still decides whether a custom object should die, be reimplemented, or be kept \u2014 because the business reality is messier than the code base. That is not a technical function alone. It is a strategic judgment about future operating model, risk appetite, and business tolerance.",
    role: "The architect holds decision authority to weight organisational context \u2014 board commitments, vendor relationships, workforce capability, operating model constraints \u2014 and translate those into a defensible platform strategy. That authority cannot be delegated.",
    accent: "#00c8b4"
  },
  {
    num: "02",
    title: "Cross-System Integration Governance",
    body: "This domain covers data flow, trust boundaries, data residency, latency, integration contracts, and who is allowed to call across SAP, Salesforce, and surrounding systems. AI can generate mappings, suggest interfaces, and orchestrate tool use \u2014 but it cannot independently define what is permitted to cross the boundary. Once an AI agent has write access and hidden instructions can persist in records, the architecture itself becomes the attack surface. That is a control decision \u2014 not an implementation detail.",
    role: "The architect defines the integration standard, enforces it across vendors, and makes trade-off calls when operational needs conflict with governance policy. AI monitors conformance. The architect owns it.",
    accent: "#00c8b4"
  },
  {
    num: "03",
    title: "Risk & Consequence Accountability",
    body: "This is the hardest domain because it is not just about correctness. It is about legal and operational responsibility. AI can help document, classify, and monitor \u2014 but it cannot be the accountable party when a decision violates policy, causes loss, or triggers regulatory action. The EU AI Act points in the same direction: human oversight is required for higher-risk systems. It is an operational and legal design constraint.",
    role: "The architect is the named accountable party for architectural decisions that carry regulatory consequences. No AI can hold that accountability.",
    accent: "#f0a500"
  },
  {
    num: "04",
    title: "Organisational Context & Political Architecture",
    body: "AI is weak at organisational reality. It cannot negotiate power, absorb blame, read informal resistance, or understand when a \u201Ctechnically elegant\u201D design will fail because it offends a sponsor, a region, or a frontline team. Dispatchers override systems they do not trust. Technicians ignore routes they do not believe in. The real problem is not whether the algorithm can compute a schedule. It is whether the organisation will accept the schedule as legitimate.",
    role: "The architect navigates organisational topology \u2014 the political map \u2014 and sequences architectural decisions in a way that builds stakeholder support rather than triggering resistance. AI has no political capital to spend.",
    accent: "#00c8b4"
  },
  {
    num: "05",
    title: "Evolution & Obsolescence Management",
    body: "AI can accelerate the discovery of obsolete code, stale workflows, and unused integrations \u2014 but it cannot decide which parts of the estate should be retired, and when. Retirement decisions are painful because they involve sunk cost, invisible dependencies, and political loss. AI can highlight the candidate set. Humans decide what gets cut.",
    role: "The architect maintains the long view \u2014 the platform lifecycle roadmap \u2014 and makes sequencing decisions that balance debt reduction, delivery, and organisational capacity. AI assists with data. The architect owns the timeline.",
    accent: "#00c8b4"
  }
];

const FUTURE_MEASURES = [
  "Whether AI is constrained before it touches core systems.",
  "Whether the organisation can prove who approved what, and why.",
  "Whether the enterprise can recover when an AI action goes wrong.",
  "Whether technical debt is being reduced rather than multiplied by automation.",
  "Whether business leaders trust the architecture enough to let agents act at all."
];

function DomainCard({ domain, index }) {
  const [expanded, setExpanded] = useState(false);
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);

  useEffect(() => {
    const observer = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) setVisible(true); },
      { threshold: 0.15 }
    );
    if (ref.current) observer.observe(ref.current);
    return () => observer.disconnect();
  }, []);

  return (
    <div
      ref={ref}
      onClick={() => setExpanded(!expanded)}
      style={{
        opacity: visible ? 1 : 0,
        transform: visible ? "translateY(0)" : "translateY(30px)",
        transition: "all 0.6s cubic-bezier(0.23, 1, 0.32, 1) " + (index * 0.1) + "s",
        background: "rgba(13, 21, 32, 0.7)",
        backdropFilter: "blur(12px)",
        WebkitBackdropFilter: "blur(12px)",
        border: "1px solid " + (expanded ? domain.accent : "#1a2838"),
        borderRadius: "12px",
        padding: "28px 28px 24px",
        cursor: "pointer",
        marginBottom: "16px",
        position: "relative",
        overflow: "hidden"
      }}
    >
      <div style={{
        position: "absolute", top: 0, left: 0, right: 0, height: "3px",
        background: expanded
          ? "linear-gradient(90deg, " + domain.accent + ", transparent)"
          : "transparent",
        transition: "all 0.4s ease"
      }} />

      <div style={{ display: "flex", alignItems: "flex-start", gap: "16px" }}>
        <span style={{
          fontFamily: "'JetBrains Mono', 'IBM Plex Mono', monospace",
          fontSize: "0.72rem",
          color: domain.accent,
          letterSpacing: "1px",
          marginTop: "3px",
          flexShrink: 0,
          opacity: 0.8
        }}>{domain.num}</span>
        <div style={{ flex: 1 }}>
          <h3 style={{
            fontSize: "1.15rem",
            fontWeight: 700,
            color: "#eef2f8",
            letterSpacing: "-0.01em",
            lineHeight: 1.35,
            marginBottom: expanded ? "16px" : "0px",
            transition: "margin 0.3s ease"
          }}>{domain.title}</h3>

          {expanded && (
            <div style={{ animation: "fadeSlideIn 0.4s ease forwards" }}>
              <p style={{
                fontSize: "0.92rem",
                color: "#b0bac6",
                lineHeight: 1.7,
                marginBottom: "20px"
              }}>{domain.body}</p>

              <div style={{
                background: "rgba(0, 200, 180, 0.06)",
                borderLeft: "3px solid " + domain.accent,
                padding: "14px 18px",
                borderRadius: "0 8px 8px 0"
              }}>
                <span style={{
                  fontFamily: "'JetBrains Mono', 'IBM Plex Mono', monospace",
                  fontSize: "0.62rem",
                  letterSpacing: "1.5px",
                  textTransform: "uppercase",
                  color: domain.accent,
                  display: "block",
                  marginBottom: "8px"
                }}>Role of the Human Architect</span>
                <p style={{
                  fontSize: "0.88rem",
                  color: "#dde2ea",
                  lineHeight: 1.6,
                  fontStyle: "italic"
                }}>{domain.role}</p>
              </div>
            </div>
          )}
        </div>

        <span style={{
          color: "#4a5568",
          fontSize: "1.2rem",
          transform: expanded ? "rotate(45deg)" : "rotate(0)",
          transition: "transform 0.3s ease",
          flexShrink: 0
        }}>+</span>
      </div>
    </div>
  );
}

function App() {
  const [scrollY, setScrollY] = useState(0);

  useEffect(() => {
    const handleScroll = () => setScrollY(window.scrollY);
    window.addEventListener("scroll", handleScroll, { passive: true });
    return () => window.removeEventListener("scroll", handleScroll);
  }, []);

  return (
    <div style={{
      minHeight: "100vh",
      background: "#080d14",
      color: "#eef2f8",
      fontFamily: "'Inter', 'Segoe UI', -apple-system, sans-serif"
    }}>

      {/* Hero */}
      <header style={{
        position: "relative",
        minHeight: "85vh",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        overflow: "hidden",
        padding: "60px 24px"
      }}>
        <div style={{
          position: "absolute", top: 0, left: 0, right: 0, bottom: 0, zIndex: 0,
          background: "radial-gradient(ellipse 600px 400px at 20% 30%, rgba(0,200,180,0.08), transparent), radial-gradient(ellipse 500px 500px at 80% 70%, rgba(240,165,0,0.05), transparent), radial-gradient(ellipse 800px 600px at 50% 50%, rgba(10,20,40,0.9), transparent)"
        }} />

        <div style={{
          position: "absolute", top: 0, left: 0, right: 0, bottom: 0, zIndex: 0,
          opacity: 0.04,
          backgroundImage: "linear-gradient(rgba(0,200,180,0.5) 1px, transparent 1px), linear-gradient(90deg, rgba(0,200,180,0.5) 1px, transparent 1px)",
          backgroundSize: "60px 60px",
          transform: "translateY(" + (scrollY * 0.1) + "px)"
        }} />

        <div style={{ position: "relative", zIndex: 1, maxWidth: "720px", textAlign: "center" }}>
          <div style={{
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: "0.68rem",
            letterSpacing: "3px",
            textTransform: "uppercase",
            color: "#00c8b4",
            marginBottom: "24px",
            opacity: 0.8
          }}>Enterprise Architecture &times; AI Governance</div>

          <h1 style={{
            fontFamily: "'Playfair Display', Georgia, serif",
            fontSize: "clamp(2.2rem, 5vw, 3.6rem)",
            fontWeight: 700,
            lineHeight: 1.15,
            letterSpacing: "-0.02em",
            marginBottom: "28px"
          }}>
            <span style={{ color: "#00c8b4" }}>Five</span> Architectural Domains{" "}
            <span style={{ fontStyle: "italic", color: "#f0a500" }}>AI Still Cannot Own</span>
          </h1>

          <p style={{
            fontSize: "1.1rem",
            color: "#7a8899",
            lineHeight: 1.7,
            maxWidth: "560px",
            margin: "0 auto 40px"
          }}>
            Technology accelerates the work.<br/>
            Accountability stays with humans.
          </p>

          <div style={{
            display: "inline-flex",
            gap: "6px",
            alignItems: "center",
            background: "rgba(0,200,180,0.08)",
            border: "1px solid rgba(0,200,180,0.15)",
            borderRadius: "40px",
            padding: "8px 20px",
            fontSize: "0.78rem",
            color: "#7a8899"
          }}>
            <span style={{ width: "6px", height: "6px", background: "#00c8b4", borderRadius: "50%", display: "inline-block", animation: "pulseGlow 2s infinite" }} />
            8 min read
          </div>
        </div>
      </header>

      {/* Opening Narrative */}
      <section style={{
        maxWidth: "680px",
        margin: "0 auto",
        padding: "0 24px 60px"
      }}>
        <div style={{
          borderLeft: "2px solid #1a2838",
          paddingLeft: "24px",
          marginBottom: "48px"
        }}>
          <p style={{ fontSize: "1.05rem", color: "#b0bac6", lineHeight: 1.8, marginBottom: "20px" }}>
            At a field service summit last year, the moderator put a simple question to the room.
          </p>
          <blockquote style={{
            fontSize: "1.25rem",
            fontStyle: "italic",
            color: "#eef2f8",
            margin: "0 0 20px 0",
            padding: "16px 0",
            borderTop: "1px solid #1a2838",
            borderBottom: "1px solid #1a2838"
          }}>
            &ldquo;How often do you override the AI scheduling recommendation?&rdquo;
          </blockquote>
          <p style={{ fontSize: "1.05rem", color: "#b0bac6", lineHeight: 1.8, marginBottom: "16px" }}>
            <span style={{ color: "#eef2f8", fontWeight: 600 }}>Every hand went up.</span>
          </p>
          <p style={{ fontSize: "1.05rem", color: "#7a8899", lineHeight: 1.8, marginBottom: "24px" }}>
            Utilities. Telco. Manufacturing. Different industries. Same answer.
          </p>
          <p style={{ fontSize: "1.05rem", color: "#b0bac6", lineHeight: 1.8 }}>
            That moment revealed something confirmed across multiple AI deployments in ERP and field service: when AI handles 60% of the analytical work, the irreplaceable 40% gets{" "}
            <span style={{ color: "#00c8b4", fontWeight: 600 }}>harder</span>, more{" "}
            <span style={{ color: "#00c8b4", fontWeight: 600 }}>consequential</span>, and more{" "}
            <span style={{ color: "#00c8b4", fontWeight: 600 }}>visible</span>.
          </p>
        </div>
      </section>

      {/* Domain Cards */}
      <section style={{
        maxWidth: "720px",
        margin: "0 auto",
        padding: "0 24px 60px"
      }}>
        <div style={{
          fontFamily: "'JetBrains Mono', monospace",
          fontSize: "0.65rem",
          letterSpacing: "2px",
          textTransform: "uppercase",
          color: "#4a5568",
          marginBottom: "28px"
        }}>The Five Domains &mdash; click to expand</div>

        {DOMAINS.map((d, i) => (
          <DomainCard key={d.num} domain={d} index={i} />
        ))}
      </section>

      {/* Field Service Dimension */}
      <section style={{
        maxWidth: "680px",
        margin: "0 auto",
        padding: "0 24px 60px"
      }}>
        <div style={{
          background: "rgba(240, 165, 0, 0.04)",
          border: "1px solid rgba(240, 165, 0, 0.12)",
          borderRadius: "12px",
          padding: "28px"
        }}>
          <span style={{
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: "0.62rem",
            letterSpacing: "1.5px",
            textTransform: "uppercase",
            color: "#f0a500"
          }}>The Field Service Dimension</span>
          <p style={{ fontSize: "0.95rem", color: "#b0bac6", lineHeight: 1.75, marginTop: "14px" }}>
            IBM&rsquo;s FSM analysis (December 2025) confirms: modern platforms eliminate fragmentation by combining FSM, EAM, IoT and AI into one architecture, governed under shared data and security standards. The architectural design of that unified platform &mdash;{" "}
            <span style={{ color: "#eef2f8", fontStyle: "italic" }}>what data model governs asset master, how FSM-EAM-SAP integration is sequenced, where AI decision authority begins and ends</span>{" "}
            &mdash; is a human architecture call. The AI operates inside it.
          </p>
        </div>
      </section>

      {/* Future Measures */}
      <section style={{
        maxWidth: "680px",
        margin: "0 auto",
        padding: "0 24px 60px"
      }}>
        <h2 style={{
          fontFamily: "'Playfair Display', Georgia, serif",
          fontSize: "1.6rem",
          fontWeight: 700,
          marginBottom: "8px",
          letterSpacing: "-0.01em"
        }}>What Changes for Architecture</h2>
        <p style={{ fontSize: "0.92rem", color: "#7a8899", marginBottom: "28px" }}>
          Five years from now, a strong architecture function will be measured on:
        </p>

        {FUTURE_MEASURES.map((m, i) => (
          <div key={i} style={{
            display: "flex",
            gap: "14px",
            alignItems: "flex-start",
            marginBottom: "16px",
            padding: "14px 18px",
            background: "rgba(13, 21, 32, 0.5)",
            border: "1px solid #1a2838",
            borderRadius: "8px"
          }}>
            <span style={{
              fontFamily: "'JetBrains Mono', monospace",
              fontSize: "0.72rem",
              color: "#00c8b4",
              flexShrink: 0,
              marginTop: "2px"
            }}>{String(i + 1).padStart(2, "0")}</span>
            <p style={{ fontSize: "0.9rem", color: "#b0bac6", lineHeight: 1.6 }}>{m}</p>
          </div>
        ))}
      </section>

      {/* Bottom Line */}
      <section style={{
        maxWidth: "680px",
        margin: "0 auto",
        padding: "0 24px 80px"
      }}>
        <div style={{
          borderTop: "1px solid #1a2838",
          paddingTop: "40px"
        }}>
          <span style={{
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: "0.65rem",
            letterSpacing: "2px",
            textTransform: "uppercase",
            color: "#00c8b4",
            display: "block",
            marginBottom: "16px"
          }}>Bottom Line</span>
          <p style={{
            fontSize: "1.15rem",
            color: "#dde2ea",
            lineHeight: 1.75,
            fontWeight: 500
          }}>
            The more autonomous the tools become, the more important the architect becomes as the person who decides where machine judgment ends and enterprise responsibility begins.
          </p>
          <p style={{
            fontSize: "0.92rem",
            color: "#7a8899",
            lineHeight: 1.7,
            marginTop: "16px"
          }}>
            The job title may stay the same.{" "}
            <span style={{ color: "#f0a500", fontStyle: "italic" }}>The skill profile will not.</span>
          </p>
        </div>
      </section>

      {/* Footer */}
      <footer style={{
        textAlign: "center",
        padding: "32px 24px 48px",
        borderTop: "1px solid #0d1520"
      }}>
        <p style={{
          fontFamily: "'JetBrains Mono', monospace",
          fontSize: "0.68rem",
          color: "#3a4558",
          letterSpacing: "1px"
        }}>&copy; 2026 &middot; Enterprise Architecture Perspectives</p>
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
